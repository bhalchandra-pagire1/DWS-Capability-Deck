<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWS Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#E60000; --purple:#9C2AA0; --ink:#0B0C0E; --grey-light:#8A8D90; --off-white:#EDEDEF;
    --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ width:100%; height:100%; overflow:hidden; background:var(--ink); }
  body{ font-family:var(--font-body); color:var(--off-white); -webkit-font-smoothing:antialiased; }
  #wrap{ position:relative; width:100%; height:100%; min-height:520px; display:flex; flex-direction:column; justify-content:center; padding:0 6vw; overflow:hidden; }
  canvas{ position:absolute; inset:0; width:100%; height:100%; opacity:0.55; }
  #glow{ position:absolute; inset:0;
    background:radial-gradient(ellipse 80% 70% at 50% 0%, rgba(230,0,0,0.16), transparent 60%),
               radial-gradient(ellipse 60% 60% at 90% 100%, rgba(156,42,160,0.16), transparent 60%); }
  .content{ position:relative; z-index:2; }
  .eyebrow{ font-family:var(--font-mono); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--red);
    display:flex; align-items:center; gap:10px; margin-bottom:16px; opacity:0; }
  .eyebrow::before{ content:''; width:26px; height:1px; background:var(--red); }
  h1{ font-family:var(--font-display); font-weight:600; font-size:clamp(30px,5.4vw,64px); line-height:1.02; letter-spacing:-0.02em; max-width:820px; }
  .line{ display:block; overflow:hidden; }
  .line span{ display:block; transform:translateY(110%); }
  .line span.red{ color:var(--red); }
  p{ opacity:0; margin-top:22px; font-size:16px; color:var(--grey-light); max-width:480px; line-height:1.6; }
  .cta{ opacity:0; display:flex; gap:14px; margin-top:32px; flex-wrap:wrap; }
  .btn{ display:inline-flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:13px;
    padding:13px 22px; border-radius:100px; border:1px solid rgba(255,255,255,0.16); color:#fff; text-decoration:none;
    transition:all .3s ease; }
  .btn-solid{ background:var(--red); border-color:var(--red); }
  .btn:hover{ transform:translateY(-2px); }
  .btn-solid:hover{ background:#ff1a1a; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="net"></canvas>
  <div id="glow"></div>
  <div class="content">
    <div class="eyebrow" id="eb">VOIS · DIGITAL WORKPLACE SOLUTIONS</div>
    <h1>
      <span class="line"><span id="l1">Smart digital experiences,</span></span>
      <span class="line"><span id="l2" class="red">engineered at Vodafone scale.</span></span>
    </h1>
    <p id="sub">DWS delivers AI-driven productivity, workplace transformation, and zero-trust security across 20 markets.</p>
    <div class="cta" id="cta">
      <a href="#" class="btn btn-solid" target="_top">Explore DWS</a>
      <a href="#" class="btn" target="_top">View Services</a>
    </div>
  </div>
</div>
<script>
  // entrance animation (no external libs — keeps this file dependency-free)
  const eb=document.getElementById('eb'), l1=document.getElementById('l1'), l2=document.getElementById('l2'),
        sub=document.getElementById('sub'), cta=document.getElementById('cta');
  const seq=[
    [eb,{opacity:1},100],[l1,{transform:'translateY(0)'},250],[l2,{transform:'translateY(0)'},380],
    [sub,{opacity:1},650],[cta,{opacity:1},780]
  ];
  seq.forEach(([el,styles,delay])=>{
    setTimeout(()=>{ el.style.transition='all .8s cubic-bezier(.16,.84,.44,1)'; Object.assign(el.style,styles); }, delay);
  });

  // particle network canvas
  const canvas=document.getElementById('net'), ctx=canvas.getContext('2d');
  let w,h,nodes=[];
  function resize(){ w=canvas.width=canvas.offsetWidth*devicePixelRatio; h=canvas.height=canvas.offsetHeight*devicePixelRatio; }
  function init(){
    resize();
    const count = window.innerWidth<700?28:50;
    nodes=Array.from({length:count},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*0.25,vy:(Math.random()-.5)*0.25,r:Math.random()*1.6+0.6}));
  }
  function tick(){
    ctx.clearRect(0,0,w,h);
    nodes.forEach(n=>{ n.x+=n.vx; n.y+=n.vy; if(n.x<0||n.x>w)n.vx*=-1; if(n.y<0||n.y>h)n.vy*=-1; });
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y),maxD=150*devicePixelRatio;
      if(d<maxD){ ctx.strokeStyle=`rgba(230,0,0,${(1-d/maxD)*0.18})`; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
    }
    nodes.forEach(n=>{ ctx.beginPath(); ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.arc(n.x,n.y,n.r*devicePixelRatio,0,Math.PI*2); ctx.fill(); });
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize', resize);
  init(); tick();
</script>
</body>
</html>
